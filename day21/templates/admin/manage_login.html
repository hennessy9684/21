<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 — 安全用网打卡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #e8ecf1;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                8px 8px 18px rgba(163, 177, 198, 0.5),
                -8px -8px 18px rgba(255, 255, 255, 0.7);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header .logo-icon {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(145deg, #d0c8f0, #c8c0e8);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 
                inset 2px 2px 5px rgba(163, 177, 198, 0.3),
                inset -2px -2px 5px rgba(255, 255, 255, 0.6);
        }
        .login-header .logo-icon svg {
            width: 28px; height: 28px; 
            color: #4a3f8a;
        }

        .login-header h1 {
            font-size: 24px; font-weight: 800;
            color: #3a3d5c;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 14px; color: #9699b0;
            font-weight: 600;
        }

        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            font-size: 12px; font-weight: 700;
            color: #636888;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            font-size: 15px; font-family: inherit;
            color: #3a3d5c;
            background: #e8ecf1;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 
                inset 3px 3px 7px rgba(163, 177, 198, 0.45),
                inset -3px -3px 7px rgba(255, 255, 255, 0.65);
            font-weight: 600;
        }

        .form-input::placeholder { color: #9699b0; font-weight: 400; }

        .form-input:focus {
            box-shadow: 
                inset 5px 5px 10px rgba(163, 177, 198, 0.4),
                inset -5px -5px 10px rgba(255, 255, 255, 0.7);
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 15px; font-weight: 700;
            color: #4a3f8a;
            background: linear-gradient(145deg, #d0c8f0, #c8c0e8);
            cursor: pointer;
            transition: all 0.3s ease; font-family: inherit;
            box-shadow: 
                4px 4px 10px rgba(163, 177, 198, 0.5),
                -4px -4px 10px rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            box-shadow: 
                6px 6px 14px rgba(163, 177, 198, 0.5),
                -6px -6px 14px rgba(255, 255, 255, 0.7);
        }

        .btn-primary:active {
            box-shadow: 
                inset 3px 3px 7px rgba(163, 177, 198, 0.4),
                inset -3px -3px 7px rgba(255, 255, 255, 0.6);
        }

        .error-message {
            background: linear-gradient(145deg, #f0d0d0, #e8c8c8);
            color: #a44a4a;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
            display: flex; align-items: center; gap: 8px; justify-content: center;
            font-weight: 600;
            box-shadow: 
                inset 2px 2px 5px rgba(163, 177, 198, 0.25),
                inset -2px -2px 5px rgba(255, 255, 255, 0.5);
        }

        .back-link {
            text-align: center; margin-top: 24px;
        }

        .back-link a {
            color: #7c6fe0; font-size: 13px; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .back-link a:hover { color: #5b4ec7; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1>管理中心</h1>
            <p>欢迎管理员登录</p>
        </div>
        
        {% if error %}
        <div class="error-message">⚠️ {{ error }}</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>手机号</label>
                <input type="text" name="phone" class="form-input" placeholder="请输入手机号" maxlength="11" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-primary">登 录</button>
        </form>
        
        <div class="back-link">
            <a href="/">← 返回首页</a>
        </div>
    </div>
</body>
</html>
