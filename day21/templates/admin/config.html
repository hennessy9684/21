{% extends "admin/base.html" %}
{% block title %}系统配置{% endblock %}

{% block extra_head %}
<style>
    .config-form { max-width: 680px; }

    .double-field {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .toggle-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        background: rgba(255,255,255,0.02);
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.25s ease;
    }
    .toggle-field:hover {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.1);
    }
    .toggle-field .tf-label {
        font-size: 14px; font-weight: 600; color: var(--text-primary);
    }
    .toggle-field .tf-hint {
        font-size: 12px; color: var(--text-muted); margin-top: 4px;
    }

    .config-save-area {
        margin-top: 28px; padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.06);
        display: flex; align-items: center; gap: 14px;
    }

    @media (max-width: 640px) {
        .double-field { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>系统配置</h1>
    <div class="breadcrumb"><span>首页</span> / 系统配置</div>
</div>

<div class="card">
    <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        活动设置
    </h2>

    {% if success %}
    <div class="alert alert-success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        {{ success }}
    </div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        {{ error }}
    </div>
    {% endif %}

    <div class="config-form">
        <form method="POST" action="{% url 'admin_config' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>活动名称</label>
                <input type="text" name="activity_name" class="form-input"
                       value="{{ config.activity_name }}" required>
            </div>

            <div class="form-group">
                <label>活动标语 <span class="form-hint">显示在首页的标语文字</span></label>
                <input type="text" name="slogan" class="form-input"
                       value="{{ config.slogan }}" required>
            </div>

            <div class="double-field">
                <div class="form-group">
                    <label>活动起始日期</label>
                    <input type="date" name="start_date" class="form-input"
                           value="{{ config.start_date }}">
                </div>
                <div class="form-group">
                    <label>活动结束日期</label>
                    <input type="date" name="end_date" class="form-input"
                           value="{{ config.end_date }}">
                </div>
            </div>

            <div class="toggle-field">
                <div>
                    <div class="tf-label">是否允许补卡</div>
                    <div class="tf-hint">开启后用户可在限期内补打卡</div>
                </div>
                <label class="toggle-switch">
                    <input type="hidden" name="allow_makeup" value="{% if config.allow_makeup %}true{% else %}false{% endif %}" id="allowMakeupHidden">
                    <input type="checkbox" id="allowMakeupCheckbox"
                           {% if config.allow_makeup %}checked{% endif %}
                           onchange="document.getElementById('allowMakeupHidden').value = this.checked ? 'true' : 'false'">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>最大补卡天数</label>
                <input type="number" name="makeup_limit" class="form-input"
                       value="{{ config.makeup_limit }}" min="0" max="21"
                       style="max-width:140px;">
            </div>

            <div class="config-save-area">
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    保存配置
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
